version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: delivery_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-delivery_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-326831}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-delivery_service}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - delivery_network

  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - delivery_network

  web:
    build:
      context: .
      target: development
    container_name: delivery_web
    # Запускаем через модуль, чтобы гарантировать правильные импорты
    command: python src/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/apps:/app  # Помогаем Django найти приложения
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - delivery_network

  celery_worker:
    build:
      context: .
      target: development
    container_name: delivery_celery_worker
    # Указываем путь к приложению celery внутри src.config
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/apps:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - delivery_network

  celery_beat:
    build:
      context: .
      target: development
    container_name: delivery_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/apps:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - delivery_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  delivery_network:
    driver: bridge
